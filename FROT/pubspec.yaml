name: abi_frotend_nd
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0   
  shared_preferences: ^2.2.3            # Para conectar con tu FastAPI en Python
  flutter_map: ^7.0.2      # reemplaza google_maps_flutter para Windows
  latlong2: ^0.9.1         # coordenadas para flutter_map
  url_launcher: ^6.3.0     # abrir Google Maps con direcciones
  geolocator: ^13.0.0      # ubicación real del usuario
  table_calendar: ^3.1.2     # Para el calendario de ferias/eventos
  provider: ^6.1.2           # Para el cambio de tema (Claro/Oscuro) y traducciones
  file_picker: ^8.0.0        # Para que el vendedor suba fotos de sus artesanías
  image_picker: ^1.1.2       # Para tomar foto con la cámara al crear/editar un producto
  video_player: ^2.8.2
  fl_chart: ^0.70.0          # Gráficos espectaculares para el Dashboard del Vendedor
  flutter_animate: ^4.5.2    # Animaciones fluidas que le dan vida a la interfaz
  toastification: ^2.3.0     # Alertas y notificaciones ultra elegantes
  hugeicons: ^1.1.2          # Iconos modernos y estilizados
  flutter_staggered_grid_view: ^0.7.0 # Grid tipo Pinterest/Masonry
  google_fonts: ^6.2.1
  web: ^1.1.1                # Interop DOM para embeber el reproductor de YouTube en Flutter Web
  flutter_inappwebview: ^6.1.5 # WebView nativo (Android/iOS/macOS/Windows) para reproducir YouTube dentro de la app
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_crafthub.png
    - assets/images/logo_crafthub_dark.png
    - assets/images/fondo_inicio.png
    - assets/images/fondo_in.png
    - assets/images/rol_back.png 
    - assets/images/banderas/Panama.png
    - assets/images/banderas/Colon.png
    - assets/images/banderas/Chiriqui.png
    - assets/images/banderas/Veraguas.png
    - assets/images/banderas/Bocas_del_Toro.png
    - assets/images/banderas/Los_Santos.png
    - assets/images/banderas/Darien.png
    - assets/images/banderas/Herrera.png
    - assets/images/banderas/Emberá_Wounaan.png
    - assets/images/banderas/Ngabe_Buglé.png
    - assets/images/banderas/Cocle.png
    - assets/images/banderas/Madugandí.png
    - assets/images/banderas/Guna_Yala.png
    - assets/images/banderas/Panama_Oeste.png
    - assets/images/Categoria/vestir.png
    - assets/images/Categoria/muebles.png
    - assets/images/Categoria/artesania.png
    - assets/images/Categoria/instrumentos.png
    - assets/images/Categoria/joyeria.png
    - assets/images/Categoria/ceramica.png
    - assets/images/Categoria/alimentos.png
    - assets/images/Categoria/calzado.png
    - assets/images/Categoria/accesorios.png
    - assets/images/bolso.png
    - assets/images/logos/
    - assets/images/avatares/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700